<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>황금 용 여관</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Noto+Sans+KR:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --amber:#c8874a;--amber-dim:#8a5a28;--amber-glow:rgba(200,135,74,0.18);
  --gold:#c9a84c;--gold-glow:rgba(201,168,76,0.25);
  --text:#e8d0a0;--text-dim:#a07840;--text-mute:#604820;
  --bg:#1a1008;--border:#4a3018;--border2:#6a4820;
  --green:#4a9e6a;--red:#c84a4a;--blue:#4a7ec8;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;overflow:hidden}

/* 로딩 */
#loading{position:fixed;inset:0;background:#1a1008;display:flex;align-items:center;justify-content:center;z-index:300;flex-direction:column;gap:12px}
.spin{font-size:32px;animation:spin 1.5s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{font-size:13px;color:var(--text-dim);font-family:'Cinzel',serif}

/* 로그인 */
#login-screen{position:fixed;inset:0;z-index:200;display:none;align-items:center;justify-content:center;background:radial-gradient(ellipse at center,#2a1a08 0%,#0d0a04 100%)}
.lp{width:360px;padding:2.5rem 2rem;background:linear-gradient(160deg,#e8d5a0 0%,#d4b878 100%);border:3px solid var(--amber);border-radius:4px;box-shadow:0 0 40px rgba(200,135,74,0.4);position:relative}
.lp::before,.lp::after{content:'✦';position:absolute;font-size:20px;color:var(--amber)}
.lp::before{top:10px;left:14px}.lp::after{bottom:10px;right:14px}
.is{text-align:center;margin-bottom:1.5rem;border-bottom:2px solid rgba(42,26,10,0.3);padding-bottom:1rem}
.is .ic{font-size:36px;display:block;margin-bottom:4px}
.is h1{font-family:'Cinzel',serif;font-size:20px;color:#2a1a0a;letter-spacing:1px}
.is p{font-size:12px;color:var(--amber-dim);margin-top:3px}
.pf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.pf label{font-size:12px;color:#2a1a0a;font-weight:500;opacity:.7}
.pf input{background:rgba(42,26,10,0.08);border:1px solid rgba(42,26,10,0.3);border-radius:3px;padding:9px 12px;font-size:14px;font-family:'Noto Sans KR',sans-serif;color:#2a1a0a;outline:none}
.pf input::placeholder{color:rgba(42,26,10,0.35)}
.err{font-size:12px;color:#8a1a0a;min-height:16px;margin-bottom:4px}
.btn-inn{width:100%;padding:11px;background:linear-gradient(135deg,#8a5a28 0%,#5a3a10 100%);color:#e8d5a0;border:2px solid var(--amber-dim);border-radius:4px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Cinzel',serif;letter-spacing:1px}
.btn-inn:hover{filter:brightness(1.15)}

/* 게임 레이아웃 */
#game-wrap{display:none;height:100vh;flex-direction:row}
#pub-container{flex:1;position:relative;overflow:hidden}
#pub-canvas{position:absolute;top:0;left:0;display:block}
#ents{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}

/* HP HUD */
#regen-notice{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);background:rgba(74,158,106,0.92);border:1px solid #4a9e6a;border-radius:20px;padding:5px 14px;font-size:11px;color:#e8ffe8;font-weight:500;display:none;pointer-events:none}
#hp-hud{position:absolute;top:10px;left:50%;transform:translateX(-50%);background:rgba(10,6,2,0.88);border:1px solid var(--border2);border-radius:20px;padding:5px 14px;display:flex;align-items:center;gap:8px;font-size:12px;pointer-events:none;white-space:nowrap}
.hb{width:90px;height:6px;background:rgba(255,255,255,0.1);border-radius:3px;overflow:hidden}
.hf{height:100%;border-radius:3px;background:#4a9e6a;transition:width .4s}

/* 캐릭터 */
.character{position:absolute;display:flex;flex-direction:column;align-items:center;pointer-events:none;transition:left .18s ease-out,top .18s ease-out}
.char-svg{width:36px;height:48px;overflow:visible;display:block}
.char-shadow{width:24px;height:6px;background:rgba(0,0,0,0.35);border-radius:50%;margin-top:-4px}
.clbl{font-size:10px;white-space:nowrap;margin-top:2px;background:rgba(10,6,2,0.85);padding:1px 6px;border-radius:10px;color:var(--text);border:1px solid var(--border2)}
.cbub{position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#e8d5a0,#d4b878);border:1px solid var(--amber-dim);border-radius:8px;padding:5px 10px;font-size:11px;white-space:nowrap;max-width:190px;overflow:hidden;text-overflow:ellipsis;color:#2a1a0a;font-weight:500;box-shadow:0 3px 12px rgba(0,0,0,0.5);animation:pop .18s ease;z-index:10}
.cbub::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:5px solid transparent;border-top-color:var(--amber-dim)}
@keyframes pop{from{opacity:0;transform:translateX(-50%) scale(.8)}to{opacity:1;transform:translateX(-50%) scale(1)}}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
.character.walking .char-svg{animation:bob .35s ease infinite}
.ripple{position:absolute;width:18px;height:18px;border-radius:50%;border:2px solid var(--gold);transform:translate(-50%,-50%) scale(0);animation:rip .5s ease-out forwards;pointer-events:none}
@keyframes rip{to{transform:translate(-50%,-50%) scale(3.5);opacity:0}}

/* 사이드 패널 */
#side-panel{
  width:290px;background:linear-gradient(180deg,#1e1208 0%,#150e06 100%);
  border-left:2px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;
}
.ptop{padding:10px 14px;border-bottom:1px solid var(--border);background:linear-gradient(90deg,rgba(200,135,74,0.08),transparent);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.iname{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:.5px}
.btnb{background:transparent;border:1px solid var(--border2);border-radius:4px;color:var(--text-dim);padding:5px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s}
.btnb:hover{color:var(--text);border-color:var(--amber-dim);background:var(--amber-glow)}

/* 탭 (3개) */
.tabs3{display:flex;gap:4px;padding:8px 10px;border-bottom:1px solid var(--border);flex-shrink:0}
.t3{flex:1;padding:6px 4px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-mute);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;transition:all .15s;text-align:center}
.t3:hover{color:var(--text-dim);border-color:var(--border2)}
.t3.ac{background:rgba(200,135,74,0.12);border-color:var(--amber-dim);color:var(--amber)}

/* 탭 콘텐츠 */
.tab-content{flex:1;overflow-y:auto;padding:10px 12px;min-height:0;display:none;flex-direction:column;gap:8px;max-height:50%}
.tab-content.active{display:flex}
.tab-content::-webkit-scrollbar{width:3px}
.tab-content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* 상태창 스타일 */
.stat-hero{display:flex;align-items:center;gap:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.stat-lv{margin-left:auto;font-family:'Cinzel',serif;font-size:13px;color:var(--amber)}
.hp-track{height:7px;background:rgba(255,255,255,0.07);border-radius:4px;overflow:hidden;border:1px solid var(--border)}
.hp-fill-s{height:100%;border-radius:4px;transition:width .4s}
.exp-track{height:4px;background:rgba(255,255,255,0.05);border-radius:2px;overflow:hidden}
.exp-fill-s{height:100%;background:var(--blue);border-radius:2px;transition:width .4s}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.stat-box{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:11px;color:var(--text-dim)}
.stat-box b{display:block;font-size:13px;color:var(--text);font-weight:500;margin-top:2px}

/* 장비 슬롯 */
.eq-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.eq-slot{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;padding:10px;text-align:center;min-height:72px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px}
.eq-slot.has{border-color:var(--amber-dim);background:rgba(200,135,74,0.08);cursor:pointer}
.eq-slot.has:hover{border-color:var(--gold);background:rgba(200,135,74,0.15)}
.eq-lbl{font-size:10px;color:var(--text-mute);letter-spacing:.5px}
.eq-icon{font-size:20px}
.eq-name{font-size:10px;color:var(--amber)}
.eq-stat{font-size:10px;color:var(--green)}

/* 인벤토리 */
.inv-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.inv-cell{background:rgba(255,255,255,0.04);border:1px solid var(--border);border-radius:5px;aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;cursor:pointer;transition:all .15s;position:relative}
.inv-cell:hover{border-color:var(--amber-dim);background:rgba(200,135,74,0.1)}
.inv-cell.empty{cursor:default;opacity:.4}
.inv-cell.empty:hover{border-color:var(--border);background:rgba(255,255,255,0.04)}
.inv-icon{font-size:17px}.inv-name{font-size:8px;color:var(--text-dim);text-align:center;line-height:1.2;overflow:hidden;max-width:95%;text-overflow:ellipsis;white-space:nowrap}
.rc{border-color:#4a7e4a!important}.ru{border-color:#4a4a9e!important}.re{border-color:#8a4a9e!important}

/* 상점 아이템 */
.shop-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:6px;margin-bottom:6px;transition:all .15s}
.shop-item:hover{border-color:var(--amber-dim);background:rgba(200,135,74,0.07)}
.shop-icon{font-size:20px;flex-shrink:0}
.shop-info{flex:1;min-width:0}
.shop-name{font-size:12px;font-weight:500;color:var(--text)}
.shop-desc{font-size:10px;color:var(--text-dim)}
.shop-stat{font-size:10px;color:var(--green)}
.shop-price{font-size:12px;color:var(--amber);font-weight:500;white-space:nowrap}
.shop-btn{padding:4px 10px;background:rgba(200,135,74,0.2);border:1px solid var(--amber-dim);border-radius:4px;color:var(--amber);font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;flex-shrink:0}
.shop-btn:hover{background:rgba(200,135,74,0.4);color:var(--gold)}
.shop-btn:disabled{opacity:.4;cursor:not-allowed}
.sell-item{display:flex;align-items:center;gap:7px;padding:7px 8px;background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:5px;margin-bottom:5px;transition:all .15s}
.sell-item:hover{border-color:#4a7e4a;background:rgba(74,126,74,0.07)}
.sell-btn{padding:3px 9px;background:rgba(74,158,106,0.2);border:1px solid #4a7e4a;border-radius:4px;color:#4a9e6a;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap;flex-shrink:0}
.sell-btn:hover{background:rgba(74,158,106,0.35);color:#7ade9a}
.gold-display{display:inline-flex;align-items:center;gap:4px;background:rgba(200,168,74,0.15);border:1px solid var(--amber-dim);border-radius:20px;padding:3px 10px;font-size:12px;color:var(--amber);font-weight:500}
/* 아이템 툴팁 */
#inn-tt{position:fixed;background:#13161e;border:1px solid var(--amber-dim);border-radius:8px;padding:9px 13px;font-size:12px;pointer-events:none;z-index:2000;display:none;min-width:140px;max-width:200px;box-shadow:0 4px 20px rgba(0,0,0,0.7)}
#inn-tt .itn{font-size:13px;font-weight:500;color:var(--gold);margin-bottom:3px}
#inn-tt .ity{font-size:10px;color:var(--text-dim);margin-bottom:5px}
#inn-tt .its{color:#4a9e6a;margin-bottom:3px;font-size:11px}
#inn-tt .itd{font-size:10px;color:var(--text-mute);border-top:1px solid var(--border);padding-top:5px;margin-top:4px}
.shop-tabs{display:flex;gap:4px;margin-bottom:10px}
.st2{flex:1;padding:5px;background:transparent;border:1px solid var(--border);border-radius:4px;color:var(--text-mute);font-size:10px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;text-align:center;transition:all .15s}
.st2.ac{background:rgba(200,135,74,0.12);border-color:var(--amber-dim);color:var(--amber)}

/* 강화 UI */
.forge-item{background:rgba(255,255,255,0.03);border:1px solid var(--border);border-radius:8px;padding:12px;margin-bottom:8px;transition:all .15s}
.forge-item.selected{border-color:#c8874a;background:rgba(200,135,74,0.08)}
.forge-item:hover{border-color:var(--border2);cursor:pointer}
.forge-header{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.forge-icon{font-size:24px}
.forge-name{font-size:13px;font-weight:500;color:var(--text)}
.forge-plus{font-family:'Cinzel',serif;font-size:13px;font-weight:700}
.forge-stats{font-size:11px;color:var(--text-dim);margin-bottom:8px}
.forge-cost{display:flex;align-items:center;justify-content:space-between;margin-top:8px;padding-top:8px;border-top:1px solid var(--border)}
.forge-btn{padding:6px 16px;background:linear-gradient(135deg,rgba(200,135,74,0.3),rgba(138,90,40,0.3));border:1px solid var(--amber-dim);border-radius:6px;color:var(--amber);font-size:12px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;font-weight:500;transition:all .15s}
.forge-btn:hover{background:linear-gradient(135deg,rgba(200,135,74,0.5),rgba(138,90,40,0.5));color:var(--gold)}
.forge-btn:disabled{opacity:.4;cursor:not-allowed}
.forge-rate{font-size:10px;color:var(--text-mute)}
/* 강화 등급 색상 */
.plus-1{color:#a0c8e0}.plus-2{color:#80e080}.plus-3{color:#e0c040}.plus-4{color:#e08040}.plus-5{color:#e04040}
.plus-max{color:#ff80ff;text-shadow:0 0 8px #ff80ff88}
#chat-bottom{
  flex:1;min-height:0;border-top:1px solid var(--border);
  padding:7px 12px 8px;background:rgba(10,6,2,0.4);
  display:flex;flex-direction:column;
}
.chat-log-small{flex:1;min-height:0;overflow-y:auto;font-size:11px;line-height:1.65;color:var(--text-dim);margin-bottom:5px}
.chat-log-small::-webkit-scrollbar{width:2px}
.chat-log-small::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}
.cl .cn{font-weight:500;color:var(--text)}
.cl.sys{color:var(--text-mute);font-style:italic}
.cl.heal{color:#4a9e6a}
.cl.loot{color:var(--gold)}
.chat-input-row{display:flex;gap:5px}
.chat-input-row input{flex:1;background:rgba(10,6,2,0.6);border:1px solid var(--border);border-radius:4px;color:var(--text);padding:6px 9px;font-size:11px;font-family:'Noto Sans KR',sans-serif;outline:none}
.chat-input-row input::placeholder{color:var(--text-mute)}
.chat-input-row button{background:rgba(138,90,40,0.25);border:1px solid var(--amber-dim);border-radius:4px;color:var(--amber);padding:6px 10px;font-size:11px;cursor:pointer;font-family:'Noto Sans KR',sans-serif;white-space:nowrap}
.chat-input-row button:hover{background:rgba(138,90,40,0.4);color:var(--gold)}
</style>
</head>
<body>

<div id="loading"><span class="spin">⚙</span><p>여관 준비 중...</p></div>

<div id="login-screen">
  <div class="lp">
    <div class="is"><span class="ic">🍺</span><h1>황금 용 여관</h1><p>모험가들의 쉼터</p></div>
    <div class="pf"><label>모험가 이름</label><input id="l-id" type="text" placeholder="아이디" autocomplete="username"/></div>
    <div class="pf"><label>암호</label><input id="l-pw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()"/></div>
    <div class="err" id="l-err"></div>
    <button class="btn-inn" onclick="doLogin()">여관 입장</button>
  </div>
</div>

<div id="game-wrap">
  <div id="pub-container">
    <canvas id="pub-canvas"></canvas>
    <div id="ents"></div>
    <div id="regen-notice">🏥 HP 회복 중...</div>
    <div id="hp-hud">
      <span id="hud-name" style="font-size:11px;color:var(--text-dim)"></span>
      <div class="hb"><div class="hf" id="hf"></div></div>
      <span id="hud-txt" style="font-size:11px"></span>
    </div>
    <!-- 하단 HP바 + 벨트 UI -->
    <div id="inn-hud" style="position:absolute;bottom:10px;left:50%;transform:translateX(-50%);display:none;flex-direction:column;align-items:center;gap:4px;pointer-events:none;z-index:50">
      <!-- HP바 -->
      <div id="inn-hpbar-wrap" style="background:rgba(10,6,2,0.85);border:1px solid var(--border2);border-radius:8px;padding:5px 12px;width:280px">
        <div style="display:flex;justify-content:space-between;margin-bottom:3px">
          <span style="font-size:10px;color:var(--text-dim)">❤️ HP</span>
          <span id="inn-hp-txt" style="font-size:10px;color:var(--text-dim)"></span>
        </div>
        <div style="height:8px;background:rgba(255,255,255,0.08);border-radius:4px;overflow:hidden">
          <div id="inn-hp-fill" style="height:100%;border-radius:4px;transition:width .3s"></div>
        </div>
      </div>
      <!-- 벨트 슬롯 -->
      <div style="background:rgba(10,6,2,0.85);border:1px solid var(--border2);border-radius:8px;padding:5px 8px;pointer-events:all">
        <div style="font-size:9px;color:var(--text-mute);text-align:center;margin-bottom:4px">🎒 벨트 <span id="inn-belt-row-lbl">1줄</span> · Tab 전환</div>
        <div style="display:flex;gap:4px" id="inn-belt-slots"></div>
      </div>
    </div>
  </div>

  <div id="side-panel">
    <div class="ptop">
      <span class="iname">🍺 황금 용 여관</span>
      <button class="btnb" onclick="goToDungeon()">⚔ 던전으로</button>
    </div>

    <!-- 3개 탭만 -->
    <div class="tabs3">
      <button class="t3 ac" id="t3-st" onclick="swTab('st')">상태</button>
      <button class="t3" id="t3-eq" onclick="swTab('eq')">장비</button>
      <button class="t3" id="t3-iv" onclick="swTab('iv')">인벤토리</button>
    </div>

    <!-- 탭 콘텐츠 (절반) -->
    <div class="tab-content active" id="tc-st"></div>
    <div class="tab-content" id="tc-eq"></div>
    <div class="tab-content" id="tc-iv"></div>

    <!-- 하단 채팅 (절반) -->
    <div id="chat-bottom">
      <div style="font-size:10px;color:var(--text-mute);padding:4px 2px 3px;letter-spacing:1px;border-bottom:1px solid var(--border);margin-bottom:4px">💬 대화</div>
      <div class="chat-log-small" id="chat-log"></div>
      <div class="chat-input-row">
        <input id="ci" type="text" placeholder="대화..." maxlength="50" onkeydown="if(event.key==='Enter')sendChat()"/>
        <button onclick="sendChat()">전송</button>
      </div>
    </div>
  </div>
</div>

<!-- 중앙 모달 (상점/강화) -->
<div id="inn-modal" style="display:none;position:fixed;inset:0;z-index:500;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);backdrop-filter:blur(3px)">
  <div style="background:linear-gradient(160deg,#1e1208,#150e06);border:2px solid var(--amber-dim);border-radius:12px;width:420px;max-height:80vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,0.8)">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);flex-shrink:0">
      <span id="modal-title" style="font-family:'Cinzel',serif;font-size:14px;color:var(--gold)"></span>
      <button onclick="closeModal()" style="background:transparent;border:1px solid var(--border2);border-radius:6px;color:var(--text-dim);width:28px;height:28px;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center">✕</button>
    </div>
    <div id="modal-body" style="flex:1;overflow-y:auto;padding:14px 18px"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="config.js"></script>

// 강화 보너스 계산
function forgeBonus(fullName){
  if(!fullName)return 0;
  const m=fullName.match(/\+(\d+)$/);
  if(!m)return 0;
  const lv=parseInt(m[1]);
  let bonus=0;
  for(let i=0;i<lv&&i<FORGE_DATA.length;i++) bonus+=FORGE_DATA[i].statBonus;
  return bonus;
}

function myAtk(){
  const b=CLS_DATA[me.cls]?.atk||[10,18];
  const wName=me.equipped?.weapon;
  const wBase=wName?ITEMS[wName.replace(/ \+\d+$/,'')]:null;
  const wb=(wBase?.atk||0)+forgeBonus(wName);
  const lb=Math.floor((me.level-1)*1.5);
  return[b[0]+wb+lb,b[1]+wb+lb];
}
function myDef(){
  const aName=me.equipped?.armor;
  const aBase=aName?ITEMS[aName.replace(/ \+\d+$/,'')]:null;
  const ab=(aBase?.def||0)+forgeBonus(aName);
  return ab+Math.floor((me.level-1)*0.8);
}

function getSellPrice(itemName){
  const s=SHOP_ITEMS.find(x=>x.name===itemName);
  if(s)return s.sellPrice;
  const it=ITEMS[itemName];if(!it)return 5;
  if(it.atk)return Math.floor(it.atk*3);
  if(it.def)return Math.floor(it.def*5);
  if(it.hp)return Math.floor((it.hp/10)*3);

}

const HEALER_X=PW*0.25,    HEALER_Y=PH*0.65;  // 치료사 - 왼쪽 벽난로 근처
const NPC_RADIUS=40;

// 마우스 위치에 따라 커서 변경
canvas.addEventListener('mousemove',e=>{
  if(!me)return;
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const px=(cx/canvas.width)*PW,py=(cy/canvas.height)*PH;
  if(Math.abs(px-EXIT_X)<35&&Math.abs(py-EXIT_Y)<45){setCur('gold');return;}
  if(Math.abs(px-MERCHANT_X)<NPC_RADIUS&&Math.abs(py-MERCHANT_Y)<NPC_RADIUS){setCur('gold');return;}
  if(Math.abs(px-BLACKSMITH_X)<NPC_RADIUS&&Math.abs(py-BLACKSMITH_Y)<NPC_RADIUS){setCur('gold');return;}
  if(Math.abs(px-HEALER_X)<NPC_RADIUS&&Math.abs(py-HEALER_Y)<NPC_RADIUS){setCur('gold');return;}
  setCur('default');
});
canvas.addEventListener('mouseleave',()=>setCur('default'));

// ── 맵 그리기 ─────────────────────────────────────
function draw(){
  torchT+=0.04;const W=canvas.width,H=canvas.height;
  ctx.clearRect(0,0,W,H);
  // 바닥
  for(let r=0;r<15;r++)for(let c=0;c<20;c++){const x=c*(W/16)+(r%2)*(W/32),y=r*(H/12);ctx.fillStyle=(r+c)%3===0?'#1e1b12':(r+c)%3===1?'#171510':'#1c1a0f';ctx.fillRect(x,y,W/16-1,H/12-1);}
  const wH=H*0.42;
  // 뒷벽
  for(let r=0;r<5;r++)for(let c=0;c<22;c++){const wx=c*(W/10)+(r%2)*(W/20),wy=r*(wH/4);ctx.fillStyle=r%2===0?(c%2===0?'#252118':'#1e1b14'):(c%2===0?'#1e1b14':'#252118');ctx.fillRect(wx+1,wy+1,W/10-2,wH/4-2);}
  const ws=ctx.createLinearGradient(0,wH-20,0,wH+20);ws.addColorStop(0,'rgba(0,0,0,0.55)');ws.addColorStop(1,'transparent');ctx.fillStyle=ws;ctx.fillRect(0,wH-20,W,40);
  // 횃불
  [[W*0.15,wH-28],[W*0.5,wH-28],[W*0.82,wH-28]].forEach(([tx,ty])=>{
    const fl=0.68+Math.sin(torchT*3.5+tx)*0.32;
    const g=ctx.createRadialGradient(tx,ty,4,tx,ty,100);g.addColorStop(0,`rgba(255,140,20,${0.25*fl})`);g.addColorStop(1,'transparent');ctx.fillStyle=g;ctx.fillRect(tx-100,ty-100,200,200);
    ctx.fillStyle='#3a2a10';ctx.fillRect(tx-5,ty-8,10,18);ctx.fillRect(tx-10,ty-10,20,6);
    ctx.fillStyle=`rgba(255,${90+Math.floor(fl*80)},15,${fl})`;ctx.beginPath();ctx.ellipse(tx,ty-14,6,11,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=`rgba(255,220,80,${fl*0.85})`;ctx.beginPath();ctx.ellipse(tx+Math.sin(torchT*4+tx)*1.5,ty-18,3,6,0,0,Math.PI*2);ctx.fill();
  });
  // 벽난로
  const fpX=W*0.15,fpY=wH,fpW=W*0.12,fpH=H*0.25,ff=0.65+Math.sin(torchT*2.5)*0.35;
  const fg=ctx.createRadialGradient(fpX,fpY,8,fpX,fpY,140);fg.addColorStop(0,`rgba(255,110,20,${0.2*ff})`);fg.addColorStop(1,'transparent');ctx.fillStyle=fg;ctx.fillRect(fpX-140,fpY-100,280,200);
  ctx.fillStyle='#2a2520';ctx.fillRect(fpX-fpW/2-12,fpY-fpH+8,fpW+24,fpH+10);ctx.fillStyle='#3a3028';ctx.fillRect(fpX-fpW/2-20,fpY-fpH-2,fpW+40,14);ctx.fillStyle='#0a0806';ctx.fillRect(fpX-fpW/2,fpY-fpH+20,fpW,fpH-16);
  for(let i=0;i<5;i++){const fx=fpX-fpW/2+8+i*(fpW-6)/4,fh=15+Math.sin(torchT*3+i*1.1)*12,fa=0.65+Math.sin(torchT*4.5+i)*0.35;ctx.fillStyle=`rgba(255,${55+i*18},10,${fa*0.9})`;ctx.beginPath();ctx.ellipse(fx,fpY-20,6,fh,0,0,Math.PI*2);ctx.fill();}
  // 테이블
  [[W*0.17,H*0.58],[W*0.41,H*0.62],[W*0.17,H*0.80],[W*0.41,H*0.81]].forEach(([tx,ty])=>{const tw=W*0.135,th=H*0.07;ctx.fillStyle='rgba(0,0,0,0.3)';ctx.fillRect(tx-tw/2+4,ty+th/2+3,tw,7);ctx.fillStyle='#5a3a18';ctx.fillRect(tx-tw/2,ty-th/2,tw,th);ctx.fillStyle='#7a5028';ctx.fillRect(tx-tw/2,ty-th/2,tw,th*0.28);ctx.strokeStyle='#3a2010';ctx.lineWidth=1.5;ctx.strokeRect(tx-tw/2,ty-th/2,tw,th);ctx.fillStyle='rgba(200,168,74,0.75)';ctx.beginPath();ctx.arc(tx+tw*0.14,ty,tw*0.06,0,Math.PI*2);ctx.fill();});
  // 러그
  ctx.fillStyle='rgba(110,35,18,0.2)';ctx.beginPath();ctx.ellipse(W*0.37,H*0.71,W*0.2,H*0.1,0,0,Math.PI*2);ctx.fill();

  // ── 치료사 NPC (벽난로 옆) ────────────────────────
  {
    const hX=W*0.25,hY=H*0.65;
    // 치유 광원 (보라/초록빛)
    const hfl=0.6+Math.sin(torchT*2.2)*0.4;
    const hg=ctx.createRadialGradient(hX,hY,5,hX,hY,80);
    hg.addColorStop(0,`rgba(160,100,255,${0.2*hfl})`);hg.addColorStop(1,'transparent');
    ctx.fillStyle=hg;ctx.fillRect(hX-80,hY-80,160,160);
    // 마법 파티클 (주변 원형)
    for(let i=0;i<5;i++){const angle=torchT*2+i*(Math.PI*2/5);const px=hX+Math.cos(angle)*22,py=hY+Math.sin(angle)*18;ctx.fillStyle=`rgba(${i%2?'160,80,255':'80,220,160'},${0.7*hfl})`;ctx.beginPath();ctx.arc(px,py,2.5,0,Math.PI*2);ctx.fill();}
    // 로브 (초록/보라)
    ctx.fillStyle='#3a1a6a';ctx.fillRect(hX-13,hY-30,26,32);
    ctx.fillStyle='#5a2a9a';ctx.fillRect(hX-11,hY-28,22,5);
    // 머리카락 (긴 금발)
    ctx.fillStyle='#e8c840';ctx.fillRect(hX-10,hY-56,20,28);
    ctx.fillRect(hX-12,hY-44,5,16);ctx.fillRect(hX+7,hY-44,5,16);
    // 머리
    ctx.fillStyle='#f0c090';ctx.beginPath();ctx.arc(hX,hY-46,12,0,Math.PI*2);ctx.fill();
    // 눈 (초록빛)
    ctx.fillStyle='#1a2a10';ctx.fillRect(hX-5,hY-49,3,3);ctx.fillRect(hX+2,hY-49,3,3);
    ctx.fillStyle='rgba(80,220,80,0.8)';ctx.beginPath();ctx.arc(hX-3.5,hY-48,1.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(hX+3.5,hY-48,1.5,0,Math.PI*2);ctx.fill();
    // 지팡이
    ctx.fillStyle='#5a3a10';ctx.fillRect(hX+14,hY-60,4,50);
    ctx.fillStyle=`rgba(160,100,255,${hfl})`;ctx.beginPath();ctx.arc(hX+16,hY-62,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.8)';ctx.beginPath();ctx.arc(hX+16,hY-64,3,0,Math.PI*2);ctx.fill();
    // 말풍선
    ctx.save();ctx.fillStyle='rgba(10,5,20,0.88)';
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(hX-42,hY-90,84,20,5);else ctx.rect(hX-42,hY-90,84,20);
    ctx.fill();ctx.strokeStyle='#8040c0';ctx.lineWidth=1;
    ctx.beginPath();if(ctx.roundRect)ctx.roundRect(hX-42,hY-90,84,20,5);else ctx.rect(hX-42,hY-90,84,20);
    ctx.stroke();ctx.fillStyle='#c080ff';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='center';
    ctx.fillText('✨ 치료사 엘리나',hX,hY-75);ctx.restore();
  }

  // ── 상인 NPC (바 카운터 뒤) — 카운터보다 먼저 그려야 뒤에 보임
  const mX=W*0.60,mY=H*0.44;
  // 상인 광원
  const mg=ctx.createRadialGradient(mX,mY,5,mX,mY,70);
  mg.addColorStop(0,'rgba(200,168,74,0.15)');mg.addColorStop(1,'transparent');
  ctx.fillStyle=mg;ctx.fillRect(mX-70,mY-70,140,140);
  // 상인 몸통
  ctx.fillStyle='#5a3a10';ctx.fillRect(mX-12,mY-28,24,28); // 옷
  ctx.fillStyle='#8a5a20';ctx.fillRect(mX-10,mY-26,20,4);  // 어깨
  // 상인 머리

  // 수염

  // 팔/상품 진열대
  ctx.fillStyle='#5a3a18';ctx.fillRect(mX-22,mY-5,44,10);
  ctx.strokeStyle='#3a2010';ctx.lineWidth=1;ctx.strokeRect(mX-22,mY-5,44,10);
  // 진열 아이템
  ctx.font='12px sans-serif';ctx.textAlign='center';
  ctx.fillText('⚔️',mX-14,mY+8);
  ctx.fillText('🛡️',mX,mY+8);
  ctx.fillText('🧪',mX+14,mY+8);
  // 말풍선 (상점 탭 클릭 유도)
  ctx.save();ctx.fillStyle='rgba(20,14,8,0.88)';
  const bx=mX,by=mY-65;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx-36,by-10,72,20,5);else ctx.rect(bx-36,by-10,72,20);
  ctx.fill();ctx.strokeStyle='#c9a84c';ctx.lineWidth=1;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(bx-36,by-10,72,20,5);else ctx.rect(bx-36,by-10,72,20);
  ctx.stroke();
  ctx.fillStyle='#e8d0a0';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='center';
  ctx.fillText('🛒 거래하기',bx,by+5);
  ctx.restore();

  // ── 대장장이 NPC (바 카운터 뒤) ──────────────────
  const fsX=W*0.70,fsY=H*0.44;
  // 불꽃 광원
  const fg2=ctx.createRadialGradient(fsX,fsY,5,fsX,fsY,80);
  fg2.addColorStop(0,`rgba(255,100,20,${0.18+Math.sin(torchT*3)*0.08})`);fg2.addColorStop(1,'transparent');
  ctx.fillStyle=fg2;ctx.fillRect(fsX-80,fsY-80,160,160);
  // 모루
  ctx.fillStyle='#444';ctx.fillRect(fsX-16,fsY-2,32,10);
  ctx.fillRect(fsX-10,fsY+8,20,14);
  ctx.fillStyle='#606060';ctx.fillRect(fsX-14,fsY-4,28,5);
  // 불꽃 (모루 위)
  const bff=0.6+Math.sin(torchT*5)*0.4;
  ctx.fillStyle=`rgba(255,${80+Math.floor(bff*60)},10,${bff*0.8})`;
  ctx.beginPath();ctx.ellipse(fsX-8,fsY-6,4,7,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=`rgba(255,200,60,${bff*0.7})`;
  ctx.beginPath();ctx.ellipse(fsX-8,fsY-9,2,4,0,0,Math.PI*2);ctx.fill();
  // 망치 (애니메이션)
  ctx.save();ctx.translate(fsX+12,fsY-24);ctx.rotate(Math.sin(torchT*4)*0.35-0.3);
  ctx.fillStyle='#7a5030';ctx.fillRect(-2,-16,4,20);
  ctx.fillStyle='#606060';ctx.fillRect(-7,-20,14,8);
  ctx.restore();
  // 몸통
  ctx.fillStyle='#4a2808';ctx.fillRect(fsX-14,fsY-34,28,32);
  ctx.fillStyle='#2a1604';ctx.fillRect(fsX-12,fsY-30,24,27); // 앞치마
  // 머리
  ctx.fillStyle='#b48060';ctx.beginPath();ctx.arc(fsX,fsY-46,13,0,Math.PI*2);ctx.fill();
  // 철모
  ctx.fillStyle='#505050';ctx.beginPath();ctx.arc(fsX,fsY-50,11,Math.PI,0);ctx.fill();
  ctx.fillRect(fsX-13,fsY-52,26,6);
  // 눈
  ctx.fillStyle='#1a0a00';ctx.fillRect(fsX-5,fsY-48,3,3);ctx.fillRect(fsX+2,fsY-48,3,3);
  // 굵은 수염
  ctx.fillStyle='#7a5030';ctx.fillRect(fsX-7,fsY-40,14,8);
  // 말풍선
  ctx.save();ctx.fillStyle='rgba(20,14,8,0.88)';
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(fsX-36,fsY-74,72,20,5);else ctx.rect(fsX-36,fsY-74,72,20);
  ctx.fill();ctx.strokeStyle='#c87040';ctx.lineWidth=1;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(fsX-36,fsY-74,72,20,5);else ctx.rect(fsX-36,fsY-74,72,20);
  ctx.stroke();ctx.fillStyle='#e8c090';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='center';
  ctx.fillText('🔨 강화하기',fsX,fsY-59);ctx.restore();

  // ── 바 카운터 (NPC 뒤에 그려서 NPC가 카운터 뒤에 있는것처럼) ──
  const bY=H*0.47;
  // 카운터 그림자
  ctx.fillStyle='rgba(0,0,0,0.4)';ctx.fillRect(W*0.55+4,bY+6,W*0.19,H*0.065);
  // 카운터 몸통
  ctx.fillStyle='#3a2010';ctx.fillRect(W*0.55,bY,W*0.19,H*0.065);
  // 카운터 상단 (밝은 나무)
  ctx.fillStyle='#6a4020';ctx.fillRect(W*0.55,bY,W*0.19,H*0.018);
  // 카운터 하단 판자 선
  ctx.strokeStyle='#2a1608';ctx.lineWidth=2;ctx.strokeRect(W*0.55,bY,W*0.19,H*0.065);
  // 판자 세로 결
  ctx.strokeStyle='rgba(0,0,0,0.2)';ctx.lineWidth=1;
  for(let i=1;i<4;i++){ctx.beginPath();ctx.moveTo(W*0.55+W*0.19/4*i,bY);ctx.lineTo(W*0.55+W*0.19/4*i,bY+H*0.065);ctx.stroke();}

  ctx.fillText('🔨',W*0.71,bY+H*0.014);
  // 카운터 앞면 테두리 강조
  ctx.fillStyle='#8a5a28';ctx.fillRect(W*0.55,bY,W*0.19,3);

  // 출구 그리기
  drawExit(W,H,wH);
}

function drawExit(W,H,wH){
  const sx=(EXIT_X/PW)*W-(25/PW)*W;
  const sy=(EXIT_Y/PH)*H-(40/PH)*H;
  const sw=(50/PW)*W, sh=(80/PH)*H;
  const fl=0.7+Math.sin(torchT*2.2)*0.3;
  // 마우스 근처인지 체크
  const near=me&&Math.abs(myPos.x-EXIT_X)<80&&Math.abs(myPos.y-EXIT_Y)<80;
  // 광원
  const g=ctx.createRadialGradient(sx+sw/2,sy+sh/2,5,sx+sw/2,sy+sh/2,near?120:90);
  g.addColorStop(0,`rgba(255,${near?200:180},${near?80:60},${(near?0.28:0.18)*fl})`);
  g.addColorStop(1,'transparent');
  ctx.fillStyle=g;ctx.fillRect(sx-60,sy-40,sw+120,sh+80);
  // 문틀
  ctx.fillStyle='#2a1a0a';ctx.fillRect(sx-4,sy-4,sw+8,sh+4);
  const dg=ctx.createLinearGradient(sx,sy,sx,sy+sh);
  dg.addColorStop(0,`rgba(255,180,80,${0.8*fl})`);dg.addColorStop(1,`rgba(180,100,30,${0.5*fl})`);
  ctx.fillStyle=dg;ctx.fillRect(sx,sy,sw,sh);
  ctx.fillStyle='#2a1a0a';ctx.beginPath();ctx.arc(sx+sw/2,sy,sw/2+4,Math.PI,0);ctx.fill();
  const ag=ctx.createRadialGradient(sx+sw/2,sy,2,sx+sw/2,sy,sw/2);
  ag.addColorStop(0,`rgba(255,200,100,${0.9*fl})`);ag.addColorStop(1,`rgba(180,100,30,${0.3*fl})`);
  ctx.fillStyle=ag;ctx.beginPath();ctx.arc(sx+sw/2,sy,sw/2,Math.PI,0);ctx.fill();
  ctx.fillStyle='#c9a84c';ctx.beginPath();ctx.arc(sx+8,sy+sh*0.5,4,0,Math.PI*2);ctx.fill();
  // 골든 테두리 (근처일 때)
  if(near){
    ctx.save();ctx.strokeStyle=`rgba(255,215,0,${0.7+Math.sin(torchT*5)*0.3})`;ctx.lineWidth=2.5;
    ctx.shadowColor='#ffd700';ctx.shadowBlur=10;
    ctx.strokeRect(sx-2,sy-2,sw+4,sh+4);ctx.restore();
  }
  // 안내 표시
  ctx.save();ctx.globalAlpha=near?0.95:0.8;
  ctx.fillStyle='rgba(10,6,2,0.9)';
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(sx+sw/2-38,sy-30,76,20,5);else ctx.rect(sx+sw/2-38,sy-30,76,20);ctx.fill();
  ctx.strokeStyle=near?'#ffd700':'#c9a84c';ctx.lineWidth=1;
  ctx.beginPath();if(ctx.roundRect)ctx.roundRect(sx+sw/2-38,sy-30,76,20,5);else ctx.rect(sx+sw/2-38,sy-30,76,20);ctx.stroke();
  ctx.fillStyle=near?'#ffd700':'#e8d0a0';ctx.font='10px Noto Sans KR,sans-serif';ctx.textAlign='center';
  ctx.fillText('🚪 던전 출구',sx+sw/2,sy-15);ctx.restore();
}

// ── 캐릭터 DOM ─────────────────────────────────────
function getOrCreate(id,data){

    const isMe=(id===me?.id);

}
function placeChar(id,data){
  const el=getOrCreate(id,data);

  el.style.left=sx+'px';el.style.top=sy+'px';el.style.transform='translate(-50%,-70%)';
}

function showBubble(id,text){
  const el=document.getElementById('c-'+id);if(!el)return;

  if(!b){b=document.createElement('div');b.className='cbub';el.insertBefore(b,el.querySelector('.char-svg'));}

// ── 클릭 이동 ─────────────────────────────────────
canvas.addEventListener('click',e=>{
  if(!me||exitTransitioning)return;
  const r=canvas.getBoundingClientRect();
  const cx=e.clientX-r.left,cy=e.clientY-r.top;
  const px=(cx/canvas.width)*PW,py=(cy/canvas.height)*PH;

  // 상인 NPC 클릭 → 상점 모달 열기
  if(Math.abs(px-MERCHANT_X)<NPC_RADIUS&&Math.abs(py-MERCHANT_Y)<NPC_RADIUS){
    openModal('sh');
    addChatLine('sys','🛒 상인 가르시아: 어서오세요! 무엇을 찾으시나요?');
    return;
  }
  // 대장장이 NPC 클릭 → 강화 모달 열기
  if(Math.abs(px-BLACKSMITH_X)<NPC_RADIUS&&Math.abs(py-BLACKSMITH_Y)<NPC_RADIUS){
    openModal('fg');
    addChatLine('sys','🔨 대장장이 보르그: 강화해드리지! 금화만 있으면 돼!');
    return;
  }
  // 치료사 NPC 클릭 → 치료사 모달 열기
  if(Math.abs(px-HEALER_X)<NPC_RADIUS&&Math.abs(py-HEALER_Y)<NPC_RADIUS){
    openModal('healer');
    addChatLine('sys','✨ 치료사 엘리나: 어서오세요. 제가 도움을 드릴게요.');
    return;
  }

  // 일반 바닥 클릭 → 이동
  if(py<PH*0.44+30)return;
  myTarget={x:Math.max(20,Math.min(PW-20,px)),y:Math.max(PH*0.44+30,Math.min(PH-20,py))};
  const rip=document.createElement('div');rip.className='ripple';rip.style.left=cx+'px';rip.style.top=cy+'px';
  ents.appendChild(rip);setTimeout(()=>rip.remove(),520);
});

// ── 메인 루프 ─────────────────────────────────────
function loop(){
  let moving=false;
  if(myTarget&&!exitTransitioning){
    const dx=myTarget.x-myPos.x,dy=myTarget.y-myPos.y,d=Math.sqrt(dx*dx+dy*dy);
    if(d>3.5){myPos.x+=dx/d*3.5;myPos.y+=dy/d*3.5;moving=true;}
    else{myPos.x=myTarget.x;myPos.y=myTarget.y;myTarget=null;}
  }
  draw();
  const all={...players};if(me)all[me.id]={...me,x:myPos.x,y:myPos.y};
  for(const[id,d]of Object.entries(all))placeChar(id,d);
  const myEl=document.getElementById('c-'+me?.id);if(myEl)myEl.classList.toggle('walking',moving);
  checkExit();
  requestAnimationFrame(loop);
}

function checkExit(){
  if(!me||exitTransitioning)return;
  const d=Math.sqrt((myPos.x-EXIT_X)**2+(myPos.y-EXIT_Y)**2);
  if(d<38){exitTransitioning=true;myTarget=null;addChatLine('sy','⚔️ 던전으로 나갑니다...');saveProfile();setTimeout(()=>window.location.href='index.html',700);}
}

// ── HP 회복 ───────────────────────────────────────
function updateHpHud(){
  if(!me)return;
  const mh=maxHp();
  const pct=Math.max(0,(me.hp/mh)*100);
  document.getElementById('hud-name').textContent=me.username;
  document.getElementById('hf').style.width=pct+'%';
  document.getElementById('hf').style.background=pct>50?'#4a9e6a':pct>25?'#c8874a':'#c84a4a';
  document.getElementById('hud-txt').textContent=`${me.hp}/${mh}`;
}
function startRegen(){
  document.getElementById('regen-notice').style.display='block';
  regenTmr=setInterval(async()=>{
    if(!me)return;const mh=maxHp();
    if(me.hp>=mh)return;
    me.hp=Math.min(mh,me.hp+5);
    updateHpHud();updateInnHud();
    if(activeTab==='st')renderSt();
    await db.from('profiles').update({hp:me.hp}).eq('id',me.id);
    addChatLine('heal',`🏥 HP +5 회복 (${me.hp}/${mh})`);
  },5000);
}

function innMaxSlots(){const bag=me?.equipped?.bag;const bd=bag?ITEMS[bag?.replace(/ \+\d+$/,'')]:null;return 20+(bd?.slots||0);}
function innStackable(name){const bn=name?.replace(/ \+\d+$/,'');const d=ITEMS[bn];if(!d)return false;return!(d.type==='weapon'||d.type==='armor'||d.type==='bag'||d.type==='buff');}

function renderEq(){
  const eq=me.equipped||{};
  const slots=[['weapon','⚔️ 무기'],['armor','🛡️ 갑옷'],['bag','🎒 가방']];
  let h='<div class="eq-grid">';
  slots.forEach(([s,lbl])=>{
    const nm=eq[s];const baseName=nm?nm.replace(/ \+\d+$/,''):null;const it=baseName?ITEMS[baseName]:null;
    if(nm&&it){const bonus=forgeBonus(nm);const st=it.atk?`공격 +${it.atk+bonus}`:it.def?`방어 +${it.def+bonus}`:it.slots?`+${it.slots}칸`:'';
      h+=`<div class="eq-slot has" onclick="innUnequip('${s}')">${lbl? `<div class="eq-lbl">${lbl}</div>`:""}<div class="eq-icon">${it.icon}</div><div class="eq-name">${nm}</div><div class="eq-stat">${st}</div></div>`;
    } else h+=`<div class="eq-slot"><div class="eq-lbl">${lbl}</div><div style="font-size:20px;opacity:.3;margin:4px 0">○</div><div style="font-size:10px;color:var(--text-mute)">비어있음</div></div>`;
  });
  h+='</div><div style="font-size:10px;color:var(--text-mute);margin-top:6px">클릭 → 장착 해제</div>';
  document.getElementById('tc-eq').innerHTML=h;
}

function innUnequip(slot){
  const eq=me.equipped||{};const nm=eq[slot];if(!nm)return;
  const inv=me.inventory||[];const max=innMaxSlots();
  if(inv.length>=max){addChatLine('sys','인벤토리가 가득 찼습니다!');return;}
  inv.push({name:nm,id:Date.now()});delete eq[slot];
  me.equipped=eq;me.inventory=inv;
  saveProfile();renderEq();renderIv();
  addChatLine('sys',`${nm} 장착 해제`);
}

function renderIv(){

  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">

  </div>

function innUseItem(idx){

// 스택 포함 아이템 수량 계산 (여관용)
function innCountItem(name){return(me.inventory||[]).reduce((s,it)=>it.name===name?s+(it.count||1):s,0);}

// 스택 포함 아이템 n개 차감 (여관용)
function innRemoveItem(name,n){
  const inv=me.inventory||[];let left=n;
  for(let i=inv.length-1;i>=0&&left>0;i--){
    if(inv[i].name!==name)continue;
    const c=inv[i].count||1;
    if(c<=left){left-=c;inv.splice(i,1);}
    else{inv[i].count=c-left;left=0;}
  }
  me.inventory=inv;
}

// 스택 포함 아이템 1개 추가 (여관용)
function innAddItem(name){
  const inv=me.inventory||[];const max=innMaxSlots();
  const stackable=innStackable(name);
  if(stackable){const ex=inv.find(it=>it.name===name);if(ex){ex.count=(ex.count||1)+1;me.inventory=inv;return true;}}
  if(inv.length>=max)return false;
  inv.push({name,id:Date.now(),count:1});me.inventory=inv;return true;
}

// ── 강화 시스템 ───────────────────────────────────
// 아이템 이름에서 강화 수치와 기본 이름 분리
function parseItemName(fullName){
  const m=fullName.match(/^(.+?) \+(\d+)$/);
  if(m)return{baseName:m[1],level:parseInt(m[2])};
  return{baseName:fullName,level:0};
}
function makeItemName(baseName,level){
  return level>0?`${baseName} +${level}`:baseName;
}

// 강화 가능한 아이템 목록 (인벤토리 + 장비창)
function getForgeableItems(){
  const result=[];
  const inv=me.inventory||[];
  inv.forEach((item,idx)=>{
    const{baseName,level}=parseItemName(item.name);
    const def=ITEMS[baseName];
    if(def&&(def.type==='weapon'||def.type==='armor')&&level<MAX_FORGE){
      result.push({item,idx,baseName,level,location:'inv'});
    }
  });
  // 장비창 아이템
  const eq=me.equipped||{};
  Object.entries(eq).forEach(([slot,fullName])=>{
    const{baseName,level}=parseItemName(fullName);
    const def=ITEMS[baseName];
    if(def&&(def.type==='weapon'||def.type==='armor')&&level<MAX_FORGE){
      result.push({item:{name:fullName},idx:slot,baseName,level,location:'equip',slot});
    }
  });
  return result;
}

function plusColor(level){
  if(level>=10)return 'plus-max';
  if(level>=5)return 'plus-5';
  if(level>=4)return 'plus-4';
  if(level>=3)return 'plus-3';
  if(level>=2)return 'plus-2';
  if(level>=1)return 'plus-1';
  return '';
}

  const def=ITEMS[entry.baseName]||{};const icon=def.icon||'📦';
  if(success){
    const newLevel=entry.level+1;const newName=makeItemName(entry.baseName,newLevel);
    if(entry.location==='inv'){const inv=me.inventory||[];if(inv[entry.idx])inv[entry.idx].name=newName;me.inventory=inv;}
    else{const eq=me.equipped||{};eq[entry.slot]=newName;me.equipped=eq;}
    saveProfile();
    document.getElementById('modal-body').innerHTML=buildForgeHTML();
    if(activeTab==='eq')renderEq();if(activeTab==='iv')renderIv();
    addChatLine('loot',`✨ 강화 성공! ${entry.baseName} +${entry.level} → +${newLevel} (-${fd.cost}G)`);
    if(newLevel>=MAX_FORGE)addChatLine('loot',`🏆 최대 강화 +${MAX_FORGE} 달성!`);
  } else {
    const newLevel=Math.max(0,entry.level-1);const newName=makeItemName(entry.baseName,newLevel);
    if(entry.location==='inv'){const inv=me.inventory||[];if(inv[entry.idx])inv[entry.idx].name=newName;me.inventory=inv;}
    else{const eq=me.equipped||{};eq[entry.slot]=newName;me.equipped=eq;}
    saveProfile();
    document.getElementById('modal-body').innerHTML=buildForgeHTML();
    if(activeTab==='eq')renderEq();if(activeTab==='iv')renderIv();
    addChatLine('sys',`💔 강화 실패... +${entry.level}→+${newLevel} (-${fd.cost}G)`);
  }
  if(activeTab==='st')renderSt();
}

// ── 채팅 ──────────────────────────────────────────
function addChatLine(cls,text){
  const box=document.getElementById('chat-log');
  const d=document.createElement('div');d.className='cl '+(cls||'sys');d.textContent=text;
  box.appendChild(d);box.scrollTop=box.scrollHeight;
}
async function pushChat(msg){await db.from('chats').insert({scope:'plaza',username:msg.sys?null:me.username,text:msg.text,is_sys:!!msg.sys});}
async function sendChat(){
  const inp=document.getElementById('ci');const t=inp.value.trim();if(!t)return;inp.value='';
  showBubble(me.id,t);
  await pushChat({text:t});
}
async function chatPoll(){
  const{data:msgs}=await db.from('chats').select('*').eq('scope','plaza')
    .gt('created_at',new Date(Date.now()-300000).toISOString())
    .order('created_at',{ascending:true}).limit(80);
  if(!msgs)return;
  const newM=msgs.filter(m=>new Date(m.created_at).getTime()>lastChatTs);
  if(!newM.length)return;
  lastChatTs=new Date(msgs[msgs.length-1].created_at).getTime();
  newM.forEach(m=>{
    if(m.is_sys)addChatLine('sys',m.text);
    else{
      const box=document.getElementById('chat-log');
      const d=document.createElement('div');d.className='cl';
      d.innerHTML=`<span class="cn" style="color:${nc(m.username)}">${m.username}</span> ${m.text}`;
      box.appendChild(d);box.scrollTop=box.scrollHeight;
      const p=Object.values(players).find(x=>x.username===m.username);
      if(p)showBubble(p.id,m.text);
    }
  });
}

// ── 프레즌스 ──────────────────────────────────────
async function saveP(){if(!me)return;await db.from('presence').upsert({id:me.id,username:me.username,cls:me.cls,x:Math.round(myPos.x),y:Math.round(myPos.y),ts:Date.now()},{onConflict:'id'});}
async function presencePoll(){
  const{data}=await db.from('presence').select('*').gt('ts',Date.now()-10000);if(!data)return;
  const online={};data.forEach(p=>{if(p.id!==me.id)online[p.id]=p;});
  for(const id of Object.keys(players)){if(!online[id]){removeChar(id);delete players[id];}}
  for(const[id,p]of Object.entries(online))players[id]={...(players[id]||{}),...p};
}

// ── DB 저장 ───────────────────────────────────────
async function saveProfile(){
  if(!me)return;
  try{
    await db.from('profiles').update({
      hp:       me.hp,
      inventory:me.inventory||[],
      equipped: me.equipped||{},
      gold:     me.gold||0,
      level:    me.level||1,
      exp:      me.exp||0,
      kills:    me.kills||0,
      defense:  myDef(),
    }).eq('id',me.id);
  }catch(e){console.error('saveProfile inn:',e);}
}

// ── 이동 ──────────────────────────────────────────
async function goToDungeon(){
  if(exitTransitioning)return;
  exitTransitioning=true;
  clearInterval(regenTmr);
  await saveProfile();
  await db.from('presence').delete().eq('id',me.id);
  await pushChat({sys:true,text:`${me.username}님이 던전으로 향했습니다.`});
  window.location.href='index.html';
}

// ── 입장 ──────────────────────────────────────────
function updateInnHud(){
  if(!me)return;
  const mh=maxHp();
  const pct=Math.max(0,Math.min(100,(me.hp/mh)*100));
  const hc=pct>50?'#4a9e6a':pct>25?'#c8874a':'#c84a4a';
  const hud=document.getElementById('inn-hud');
  if(hud){
    hud.style.display='flex';
    document.getElementById('inn-hp-txt').textContent=`${me.hp} / ${mh}`;
    document.getElementById('inn-hp-fill').style.width=pct+'%';
    document.getElementById('inn-hp-fill').style.background=hc;
    // 벨트 슬롯 렌더
    document.getElementById('inn-belt-row-lbl').textContent=`${innHotbarRow+1}줄`;
    const slots=document.getElementById('inn-belt-slots');
    slots.innerHTML='';
    for(let i=0;i<4;i++){
      const name=innHotbar[innHotbarRow][i];
      const def=name?ITEMS[name?.replace(/ \+\d+$/,'')]||{}:{};
      const div=document.createElement('div');
      div.style.cssText=`width:44px;height:44px;border-radius:6px;border:1px solid ${name?'var(--amber-dim)':'var(--border2)'};background:${name?'rgba(60,40,20,0.9)':'rgba(20,18,30,0.85)'};display:flex;flex-direction:column;align-items:center;justify-content:center;position:relative;cursor:${name?'pointer':'default'};pointer-events:all`;
      div.innerHTML=`<span style="font-size:9px;position:absolute;top:2px;left:3px;color:rgba(255,255,255,0.4)">${'QWER'[i]}</span>${name?`<span style="font-size:19px">${def.icon||'📦'}</span>${def.type==='potion'&&def.hp?`<span style="font-size:8px;color:#4a9e6a;font-weight:700">+${def.hp>=9999?'F':def.hp}</span>`:''}`:'' }`;
      if(name){div.onclick=()=>{useInnBeltItem(i);updateInnHud();};}
      slots.appendChild(div);
    }
  }
}

function useInnBeltItem(slot){
  const itemName=innHotbar[innHotbarRow][slot];if(!itemName||!me)return;
  const bn=itemName.replace(/ \+\d+$/,'');const def=ITEMS[bn];if(!def)return;
  if(def.type==='potion'){
    const mh=maxHp(),healed=Math.min(def.hp||0,mh-me.hp);
    if(healed<=0){addChatLine('sys','HP가 이미 가득 찼습니다!');return;}
    me.hp=Math.min(mh,me.hp+(def.hp||0));
    innHotbar[innHotbarRow][slot]=null;
    try{localStorage.setItem('belt_'+me.id,JSON.stringify(innHotbar));}catch(e){}
    updateHpHud();updateInnHud();saveP();
    addChatLine('heal',`🧪 ${itemName} 사용! HP +${healed}`);
  }
}

// Tab키로 벨트 줄 전환 (여관)
document.addEventListener('keydown',e=>{
  if(e.target.tagName==='INPUT')return;
  if(e.key==='Tab'){e.preventDefault();innHotbarRow=innHotbarRow===0?1:0;updateInnHud();}
});

function enterInn(){
  myPos={x:280+Math.random()*200,y:380+Math.random()*180};
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('game-wrap').style.display='flex';
  // 벨트 로드
  try{const saved=localStorage.getItem('belt_'+me.id);if(saved){const b=JSON.parse(saved);if(Array.isArray(b)&&b.length===2)innHotbar=b;}}catch(e){}
  resize();updateHpHud();updateInnHud();startRegen();loop();
  swTab('st');setInterval(saveP,1800);setInterval(presencePoll,2000);setInterval(chatPoll,1400);
  chatPoll();
  addChatLine('sys','🍺 여관에 입장했습니다. HP 자동 회복 중...');
  pushChat({sys:true,text:`${me.username}님이 여관에 들어왔습니다.`});
}

// ── 로그인 폼 ─────────────────────────────────────
async function doLogin(){
  const username=document.getElementById('l-id').value.trim().toLowerCase();
  const password=document.getElementById('l-pw').value;
  document.getElementById('l-err').textContent='';
  if(!username||!password){document.getElementById('l-err').textContent='아이디와 비밀번호를 입력해주세요';return;}
  const email=username.includes('@')?username:`${username}@dungeon.game`;
  const{data,error}=await db.auth.signInWithPassword({email,password});
  if(error){document.getElementById('l-err').textContent='아이디 또는 비밀번호가 올바르지 않습니다';return;}
  const{data:p}=await db.from('profiles').select('*').eq('id',data.user.id).single();
  me=p?{...p,inventory:p.inventory||[],equipped:p.equipped||{}}:{id:data.user.id,username,cls:'전사',hp:120,maxHp:120,gold:0,level:1,kills:0,exp:0,inventory:[],equipped:{}};
  enterInn();
}

window.addEventListener('beforeunload',async()=>{try{await db.from('presence').delete().eq('id',me?.id);}catch(e){}});

// ── 자동 로그인 ───────────────────────────────────
(async()=>{
  try{
    const{data:{session}}=await db.auth.getSession();
    if(session){
      const uid=session.user.id;
      const username=session.user.email.split('@')[0];
      // DB에서 최신 프로필 불러오기 (아이템/레벨 모두 포함)
      const{data:p,error}=await db.from('profiles').select('*').eq('id',uid).single();
      if(p){
        me={
          ...p,
          inventory: Array.isArray(p.inventory)?p.inventory:[],
          equipped:  (p.equipped&&typeof p.equipped==='object')?p.equipped:{},
          level:     p.level||1,
          exp:       p.exp||0,
          gold:      p.gold||0,
          kills:     p.kills||0,
        };
      } else {
        me={id:uid,username,cls:'전사',hp:120,maxHp:120,gold:0,level:1,kills:0,exp:0,inventory:[],equipped:{}};
      }
      enterInn();
      return;
    }
  }catch(e){console.error('자동로그인 오류:',e);}
  document.getElementById('loading').style.display='none';
  document.getElementById('login-screen').style.display='flex';
})();
</script>
